<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAV · MonRendezVousVeto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F8F7F4;color:#1A1A2E;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#E5E3DF;border-radius:3px}
select,input,textarea,button{font-family:'DM Sans',sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ── CONFIG Supabase ────────────────────────────────────────────────────────
// Ces valeurs sont remplacées automatiquement par Vercel (variables d'env)
const SUPABASE_URL  = "REMPLACE_PAR_TON_URL_SUPABASE";
const SUPABASE_ANON = "REMPLACE_PAR_TON_ANON_KEY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const ME = "Thomas"; // ← change par ton prénom
const STATUSES   = ["Ouvert","En cours","En attente","Résolu"];
const PRIORITIES = ["Basse","Normale","Haute","Critique"];
const AGENTS     = [{name:"Thomas"},{name:"Noémie"},{name:"Chloé"}];

const STATUS_CFG  = {
  "Ouvert":     {color:"#3B82F6",bg:"#EFF6FF"},
  "En cours":   {color:"#F59E0B",bg:"#FFFBEB"},
  "En attente": {color:"#8B5CF6",bg:"#F5F3FF"},
  "Résolu":     {color:"#10B981",bg:"#ECFDF5"},
};
const PRIORITY_CFG = {
  "Basse":    {color:"#6B7280",bg:"#F9FAFB"},
  "Normale":  {color:"#3B82F6",bg:"#EFF6FF"},
  "Haute":    {color:"#F59E0B",bg:"#FFFBEB"},
  "Critique": {color:"#EF4444",bg:"#FEF2F2"},
};

// ── Helpers ────────────────────────────────────────────────────────────────
const fmtFR = iso => iso ? new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
function timeAgo(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return "à l'instant"; if(m<60) return `il y a ${m}min`;
  const h=Math.floor(m/60); if(h<24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h/24)}j`;
}
const initials = name => (name||"?").split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2)||"?";
const AvaColors = ["#0D7377","#7C3AED","#DB2777","#0369A1","#065F46"];

// ── Atoms ──────────────────────────────────────────────────────────────────
function StatusBadge({status,small}){
  const c=STATUS_CFG[status]||STATUS_CFG["Ouvert"];
  return <span style={{background:c.bg,color:c.color,padding:small?"2px 7px":"3px 10px",borderRadius:99,
    fontSize:small?10:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,border:`1px solid ${c.color}22`}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:c.color,display:"inline-block"}}/>{status}
  </span>;
}
function PriBadge({priority}){
  const c=PRIORITY_CFG[priority]||PRIORITY_CFG["Normale"];
  return <span style={{background:c.bg,color:c.color,padding:"2px 7px",borderRadius:99,fontSize:10,fontWeight:600,border:`1px solid ${c.color}33`}}>{priority}</span>;
}
function Ava({name="?",size=28}){
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
    background:AvaColors[(name||"A").charCodeAt(0)%AvaColors.length],color:"#fff",
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38,fontWeight:700}}>{initials(name)}</div>;
}
function Tag({t}){return <span style={{background:"#F0FDF4",color:"#15803D",padding:"1px 7px",borderRadius:99,fontSize:10,fontWeight:600,border:"1px solid #BBF7D0"}}>{t}</span>;}
function Fld({label,children}){
  return <div>
    <label style={{fontSize:11,fontWeight:600,color:"#6B7280",textTransform:"uppercase",letterSpacing:.4,display:"block",marginBottom:4}}>{label}</label>
    {children}
  </div>;
}
function Spinner(){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:48,color:"#9CA3AF",gap:10,fontSize:13}}>
    <div style={{width:18,height:18,border:"2px solid #E5E3DF",borderTopColor:"#0D7377",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>Chargement…
  </div>;
}
function Toast({msg,ok,visible}){
  return <div style={{position:"fixed",bottom:18,right:18,background:ok?"#0D7377":"#EF4444",color:"#fff",
    padding:"10px 16px",borderRadius:9,fontSize:13,zIndex:9999,pointerEvents:"none",
    transition:"all .25s",transform:visible?"translateY(0)":"translateY(60px)",opacity:visible?1:0}}>{msg}</div>;
}
const inp={width:"100%",padding:"8px 10px",border:"1px solid #E5E3DF",borderRadius:8,fontSize:13.5,color:"#1A1A2E",background:"#FAFAF9",outline:"none"};

function NavBtn({icon,label,sub,active,onClick,badge}){
  const [h,setH]=useState(false);
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 9px",borderRadius:8,border:"none",
      cursor:"pointer",textAlign:"left",marginBottom:2,fontFamily:"inherit",
      background:active?"#0D7377":h?"#F3F4F6":"transparent",
      color:active?"#fff":"#374151",fontSize:13,fontWeight:active?600:400,transition:"background .13s"}}>
    <span style={{fontSize:13}}>{icon}</span>
    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
    {sub&&<span style={{fontSize:10,opacity:.6,flexShrink:0}}>{sub}</span>}
    {badge!=null&&<span style={{background:active?"rgba(255,255,255,.3)":"#0D7377",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99,flexShrink:0}}>{badge}</span>}
  </button>;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function Sidebar({view,setView,query,setQuery,sf,setSF,clinics,selClinic,onSelectClinic,onNewTicket,onNewClinic,myOpen,tickets}){
  return <aside style={{background:"#fff",borderRadius:16,border:"1px solid #E5E3DF",padding:"20px 14px",position:"sticky",top:24}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,paddingBottom:16,borderBottom:"1px solid #F0EFEC"}}>
      <div style={{width:36,height:36,borderRadius:10,background:"#0D7377",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🐾</div>
      <div><div style={{fontWeight:700,fontSize:13}}>MonRendezVousVeto</div><div style={{fontSize:11,color:"#9CA3AF"}}>SAV · Ticketing</div></div>
    </div>
    <button onClick={onNewTicket} style={{width:"100%",padding:"9px",background:"#0D7377",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:14}}>
      <span style={{fontSize:16,lineHeight:1}}>+</span> Nouveau ticket
    </button>
    <div style={{position:"relative",marginBottom:10}}>
      <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#9CA3AF"}}>🔍</span>
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ticket, clinique, tag…"
        style={{width:"100%",padding:"7px 9px 7px 30px",border:"1px solid #E5E3DF",borderRadius:8,fontSize:12.5,outline:"none",color:"#1A1A2E",background:"#FAFAF9"}}/>
    </div>
    <select value={sf} onChange={e=>setSF(e.target.value)}
      style={{width:"100%",padding:"7px 9px",border:"1px solid #E5E3DF",borderRadius:8,fontSize:12.5,color:"#1A1A2E",background:"#FAFAF9",marginBottom:14,outline:"none"}}>
      <option value="Tous">Tous les statuts</option>
      {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
    </select>
    <div style={{marginBottom:14}}>
      <NavBtn icon="📊" label="Tableau de bord" active={view==="dashboard"} onClick={()=>setView("dashboard")}/>
      <NavBtn icon="🎫" label="Mes tickets" active={view==="myTickets"} onClick={()=>setView("myTickets")} badge={myOpen||null}/>
    </div>
    <div style={{borderTop:"1px solid #F0EFEC",paddingTop:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,paddingLeft:4}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#9CA3AF"}}>Cliniques</div>
        <button onClick={onNewClinic} title="Ajouter une clinique"
          style={{width:22,height:22,borderRadius:6,border:"1px solid #E5E3DF",background:"#F9FAFB",color:"#0D7377",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
      {clinics.map(c=>{
        const open=tickets.filter(t=>t.clinic_id===c.id&&t.status!=="Résolu").length;
        return <NavBtn key={c.id} icon="🏥" label={c.name} sub={c.city}
          active={view==="clinic"&&selClinic===c.id} onClick={()=>onSelectClinic(c.id)} badge={open||null}/>;
      })}
    </div>
  </aside>;
}

// ── List panel ─────────────────────────────────────────────────────────────
function ListPanel({list,title,clinicsById,selId,onSelect,onNewTicket,loading}){
  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #E5E3DF"}}>
    <div style={{padding:"15px 16px 12px",borderBottom:"1px solid #F0EFEC",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14}}>{title}</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{list.length} ticket{list.length!==1?"s":""}</div>
      </div>
      {onNewTicket&&<button onClick={onNewTicket} style={{padding:"5px 12px",background:"#0D7377",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Nouveau</button>}
    </div>
    <div style={{maxHeight:580,overflowY:"auto",padding:"6px"}}>
      {loading?<Spinner/>:list.length===0
        ?<div style={{textAlign:"center",padding:"32px",color:"#9CA3AF",fontSize:13}}>Aucun ticket.</div>
        :list.map(t=><TicketRow key={t.id} t={t} clinic={clinicsById[t.clinic_id]} active={t.id===selId} onClick={()=>onSelect(t.id)}/>)}
    </div>
  </div>;
}

function TicketRow({t,clinic,active,onClick}){
  const [h,setH]=useState(false);
  const isNewEmail=t.channel==="Email"&&t.status==="Ouvert";
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{width:"100%",textAlign:"left",padding:"11px 9px",borderRadius:10,fontFamily:"inherit",
      border:active?"1.5px solid #0D7377":"1.5px solid transparent",
      background:active?"#F0FAFA":h?"#FAFAF9":"transparent",cursor:"pointer",marginBottom:2,transition:"all .12s"}}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:5}}>
      <span style={{fontWeight:600,fontSize:13,color:"#1A1A2E",lineHeight:1.3,display:"flex",alignItems:"center",gap:5}}>
        {isNewEmail&&<span style={{width:7,height:7,borderRadius:"50%",background:"#3B82F6",display:"inline-block",flexShrink:0}}/>}
        {t.title}
      </span>
      <span style={{fontSize:10,color:"#9CA3AF",flexShrink:0,marginTop:2}}>{timeAgo(t.updated_at)}</span>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>
      <span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 6px",borderRadius:99,fontWeight:600,fontFamily:"monospace"}}>{String(t.id).slice(0,8).toUpperCase()}</span>
      {clinic
        ?<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 6px",borderRadius:99}}>{clinic.name}</span>
        :t.sender_email&&<span style={{fontSize:10,color:"#9CA3AF",background:"#FFF8F0",padding:"1px 6px",borderRadius:99,border:"1px solid #FFE0BA"}}>📧 {t.sender_email}</span>}
      <StatusBadge status={t.status} small/><PriBadge priority={t.priority}/>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      {t.assigned_to&&<><Ava name={t.assigned_to} size={16}/><span style={{fontSize:11,color:"#6B7280"}}>{t.assigned_to}</span></>}
      {t.channel==="Email"&&<span style={{fontSize:10,color:"#6B7280",background:"#F0F4FF",padding:"1px 6px",borderRadius:99}}>✉ Email</span>}
      {(t.tags||[]).slice(0,2).map(tag=><Tag key={tag} t={tag}/>)}
    </div>
  </button>;
}

// ── Detail panel ───────────────────────────────────────────────────────────
function DetailPanel({t,clinicsById,onSetStatus,onSetPriority,onAssign,replyDraft,setReplyDraft,replyMode,setReplyMode,onSendReply,messages,loadingMsgs}){
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  if(!t) return <div style={{background:"#fff",borderRadius:16,border:"1px solid #E5E3DF",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,padding:40,color:"#9CA3AF",gap:8}}>
    <span style={{fontSize:40,opacity:.35}}>🎫</span>
    <div style={{fontWeight:600,fontSize:14}}>Aucun ticket sélectionné</div>
    <div style={{fontSize:13}}>Cliquez sur un ticket dans la liste.</div>
  </div>;

  const clinic=clinicsById[t.clinic_id];
  const sel={padding:"5px 8px",border:"1px solid #E5E3DF",borderRadius:7,fontSize:12,color:"#1A1A2E",background:"#FAFAF9",outline:"none",cursor:"pointer"};

  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #E5E3DF",overflow:"hidden"}}>
    <div style={{padding:"16px 18px",borderBottom:"1px solid #F0EFEC",background:"linear-gradient(135deg,#F0FAFA,#fff 60%)"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:10}}>
        <div style={{minWidth:0}}>
          <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,marginBottom:3,fontFamily:"monospace"}}>
            {String(t.id).slice(0,8).toUpperCase()} · {t.channel}
            {t.sender_email&&<span style={{marginLeft:6,color:"#6B7280"}}>· ✉ {t.sender_email}</span>}
          </div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#1A1A2E",lineHeight:1.3}}>{t.title}</div>
        </div>
        <button onClick={()=>onSetStatus(t.id,t.status==="Résolu"?"En cours":"Résolu")}
          style={{padding:"7px 13px",borderRadius:8,border:"none",cursor:"pointer",flexShrink:0,fontFamily:"inherit",
            background:t.status==="Résolu"?"#F3F4F6":"#10B981",color:t.status==="Résolu"?"#6B7280":"#fff",fontSize:12,fontWeight:600}}>
          {t.status==="Résolu"?"↩ Réouvrir":"✓ Résoudre"}
        </button>
      </div>

      {!t.clinic_id&&t.sender_email&&(
        <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#92400E",display:"flex",alignItems:"center",gap:6}}>
          ⚠️ Email <strong>{t.sender_email}</strong> non reconnu — ajoutez cet email à une clinique pour l'associer automatiquement.
        </div>
      )}

      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        <StatusBadge status={t.status}/><PriBadge priority={t.priority}/>
        {clinic&&<span style={{fontSize:11,padding:"2px 8px",background:"#F3F4F6",borderRadius:99,color:"#374151"}}>🏥 {clinic.name} · {clinic.city}</span>}
        {(t.tags||[]).map(tag=><Tag key={tag} t={tag}/>)}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>Statut
          <select value={t.status} onChange={e=>onSetStatus(t.id,e.target.value)} style={sel}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>
        </label>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>Priorité
          <select value={t.priority} onChange={e=>onSetPriority(t.id,e.target.value)} style={sel}>{PRIORITIES.map(p=><option key={p} value={p}>{p}</option>)}</select>
        </label>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>
          {t.assigned_to&&<Ava name={t.assigned_to} size={20}/>}Assigné
          <select value={t.assigned_to||""} onChange={e=>onAssign(t.id,e.target.value)} style={sel}>
            <option value="">Non assigné</option>
            {AGENTS.map(a=><option key={a.name} value={a.name}>{a.name}</option>)}
          </select>
        </label>
        <span style={{marginLeft:"auto",fontSize:10,color:"#9CA3AF"}}>Màj {fmtFR(t.updated_at)}</span>
      </div>
    </div>

    <div style={{padding:"14px 18px",borderBottom:"1px solid #F0EFEC",maxHeight:300,overflowY:"auto"}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:"#9CA3AF",marginBottom:12}}>
        Historique ({messages.length} message{messages.length!==1?"s":""})
      </div>
      {loadingMsgs?<Spinner/>:messages.length===0
        ?<div style={{fontSize:13,color:"#9CA3AF"}}>Aucun message.</div>
        :messages.map((m,i)=><MsgBubble key={m.id||i} m={m}/>)}
      <div ref={bottomRef}/>
    </div>

    <div style={{padding:"14px 18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
        <div style={{fontSize:12,fontWeight:700,color:"#374151"}}>Répondre</div>
        <div style={{display:"flex",gap:5}}>
          {[["client","✉ Client"],["internal","🔒 Interne"]].map(([v,lbl])=>
            <button key={v} onClick={()=>setReplyMode(v)} style={{padding:"4px 9px",borderRadius:6,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
              background:replyMode===v?"#0D7377":"#F3F4F6",color:replyMode===v?"#fff":"#6B7280"}}>{lbl}</button>)}
        </div>
      </div>
      <textarea value={replyDraft} onChange={e=>setReplyDraft(e.target.value)}
        placeholder={replyMode==="internal"?"Note interne (équipe uniquement)…":"Message au client…"}
        onKeyDown={e=>{if(e.ctrlKey&&e.key==="Enter")onSendReply();}}
        style={{width:"100%",minHeight:72,padding:"9px 11px",resize:"vertical",outline:"none",
          border:`1.5px solid ${replyMode==="internal"?"#8B5CF6":"#E5E3DF"}`,
          borderRadius:9,fontSize:13,lineHeight:1.5,background:replyMode==="internal"?"#FDFBFF":"#FAFAF9"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
        <span style={{fontSize:11,color:"#9CA3AF"}}>{replyMode==="internal"?"🔒 Note interne":"✉ Client"} · Ctrl+Entrée</span>
        <button onClick={onSendReply} disabled={!replyDraft.trim()}
          style={{padding:"8px 17px",border:"none",borderRadius:8,fontSize:13,fontWeight:600,fontFamily:"inherit",
            cursor:replyDraft.trim()?"pointer":"default",
            background:replyDraft.trim()?"#0D7377":"#E5E3DF",color:replyDraft.trim()?"#fff":"#9CA3AF"}}>Envoyer</button>
      </div>
    </div>
  </div>;
}

function MsgBubble({m}){
  const isClient=m.kind==="client";
  const isInternal=m.kind==="internal";
  return <div style={{display:"flex",gap:9,marginBottom:11,flexDirection:isClient?"row":"row-reverse"}}>
    <Ava name={m.from_name||"?"} size={26}/>
    <div style={{maxWidth:"76%"}}>
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexDirection:isClient?"row":"row-reverse"}}>
        <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{m.from_name}</span>
        {isInternal&&<span style={{fontSize:10,background:"#F5F3FF",color:"#7C3AED",padding:"1px 6px",borderRadius:99,fontWeight:600}}>Interne</span>}
        <span style={{fontSize:10,color:"#9CA3AF"}}>{fmtFR(m.created_at)}</span>
      </div>
      <div style={{padding:"8px 11px",fontSize:13,lineHeight:1.55,whiteSpace:"pre-wrap",
        borderRadius:isClient?"4px 11px 11px 11px":"11px 4px 11px 11px",
        background:isInternal?"#F5F3FF":isClient?"#F3F4F6":"#0D7377",
        color:isInternal?"#5B21B6":isClient?"#374151":"#fff",
        border:isInternal?"1px solid #DDD6FE":"none"}}>{m.text}</div>
    </div>
  </div>;
}

// ── Modal shell ────────────────────────────────────────────────────────────
function Modal({title,subtitle,onClose,children}){
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
    style={{position:"fixed",inset:0,background:"rgba(26,26,46,.5)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
      <div style={{padding:"18px 22px",borderBottom:"1px solid #F0EFEC",background:"linear-gradient(135deg,#F0FAFA,#fff 60%)",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20}}>{title}</div>
          {subtitle&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{subtitle}</div>}
        </div>
        <button onClick={onClose} style={{background:"none",border:"1px solid #E5E3DF",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:14,color:"#9CA3AF",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
      </div>
      <div style={{padding:"18px 22px"}}>{children}</div>
    </div>
  </div>;
}
function ModalFooter({onClose,onConfirm,disabled,label,saving}){
  return <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
    <button onClick={onClose} style={{padding:"9px 17px",background:"#F3F4F6",color:"#374151",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Annuler</button>
    <button onClick={onConfirm} disabled={disabled||saving}
      style={{padding:"9px 17px",border:"none",borderRadius:8,fontSize:13,fontWeight:600,fontFamily:"inherit",
        cursor:(disabled||saving)?"default":"pointer",
        background:(disabled||saving)?"#E5E3DF":"#0D7377",color:(disabled||saving)?"#9CA3AF":"#fff"}}>
      {saving?"…":label}
    </button>
  </div>;
}

function TicketModal({clinics,form,setForm,onCreate,onClose,saving}){
  return <Modal title="Nouveau ticket" subtitle="Créez et assignez immédiatement." onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Fld label="Clinique *">
          <select value={form.clinicId} onChange={e=>setForm(p=>({...p,clinicId:e.target.value}))} style={inp}>
            {clinics.map(c=><option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
          </select>
        </Fld>
        <Fld label="Assigné à">
          <select value={form.assignee} onChange={e=>setForm(p=>({...p,assignee:e.target.value}))} style={inp}>
            {AGENTS.map(a=><option key={a.name} value={a.name}>{a.name}</option>)}
          </select>
        </Fld>
        <Fld label="Priorité">
          <select value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} style={inp}>
            {PRIORITIES.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </Fld>
        <Fld label="Tags (virgules)">
          <input value={form.tags} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="GMVet, Synchro" style={inp}/>
        </Fld>
      </div>
      <Fld label="Titre *">
        <input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}
          placeholder="Ex : Plus de créneaux en ligne" style={inp} onKeyDown={e=>{if(e.key==="Enter")onCreate();}}/>
      </Fld>
      <Fld label="Premier message (optionnel)">
        <textarea value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))}
          placeholder="Contexte…" style={{...inp,minHeight:72,resize:"vertical"}}/>
      </Fld>
      <ModalFooter onClose={onClose} onConfirm={onCreate} disabled={!form.clinicId||!form.title.trim()} label="Créer le ticket" saving={saving}/>
    </div>
  </Modal>;
}

function ClinicModal({form,setForm,onCreate,onClose,saving}){
  return <Modal title="Nouvelle clinique" subtitle="Ajoutez une clinique partenaire." onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Fld label="Nom *"><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Clinique Vét. Bordeaux" style={inp}/></Fld>
        <Fld label="Ville *"><input value={form.city} onChange={e=>setForm(p=>({...p,city:e.target.value}))} placeholder="Bordeaux" style={inp}/></Fld>
        <Fld label="Email (auto-match ✉)"><input value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="contact@clinique.fr" type="email" style={inp}/></Fld>
        <Fld label="Téléphone"><input value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="05 XX XX XX XX" style={inp}/></Fld>
      </div>
      <div style={{background:"#F0FAFA",border:"1px solid #C5EAEA",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#0D7377"}}>
        💡 L'email sert à relier automatiquement les emails entrants à cette clinique.
      </div>
      <ModalFooter onClose={onClose} onConfirm={onCreate} disabled={!form.name.trim()||!form.city.trim()} label="Ajouter la clinique" saving={saving}/>
    </div>
  </Modal>;
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function Dashboard({kpis,myTickets,clinicsById,selTicket,onSelectTicket,loading,...rest}){
  return <div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        {label:"Ouverts",   value:kpis.ouvert,  color:"#3B82F6",sub:"À traiter"},
        {label:"En cours",  value:kpis.enCours, color:"#F59E0B",sub:"En investigation"},
        {label:"En attente",value:kpis.attente, color:"#8B5CF6",sub:"Retour attendu"},
        {label:"Résolus",   value:kpis.resolu,  color:"#10B981",sub:"Ce mois"},
      ].map(k=><div key={k.label} style={{background:"#fff",borderRadius:12,border:"1px solid #E5E3DF",padding:"15px 16px"}}>
        <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{k.label}</div>
        <div style={{fontSize:28,fontWeight:700,color:k.color,lineHeight:1,fontFamily:"'DM Serif Display',serif"}}>{k.value}</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginTop:4}}>{k.sub}</div>
        <div style={{height:3,background:"#F3F4F6",borderRadius:2,marginTop:9,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:2,background:k.color,transition:"width .5s",width:`${Math.round((k.value/Math.max(kpis.total,1))*100)}%`}}/>
        </div>
      </div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:16,alignItems:"start"}}>
      <ListPanel list={myTickets.slice(0,8)} title="Mes tickets actifs" clinicsById={clinicsById}
        selId={selTicket?.id} onSelect={onSelectTicket} loading={loading}/>
      <DetailPanel t={selTicket} clinicsById={clinicsById} {...rest}/>
    </div>
  </div>;
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]              = useState("dashboard");
  const [clinics,setClinics]        = useState([]);
  const [tickets,setTickets]        = useState([]);
  const [messages,setMessages]      = useState([]);
  const [clinicId,setClinicId]      = useState(null);
  const [ticketId,setTicketId]      = useState(null);
  const [query,setQuery]            = useState("");
  const [sf,setSF]                  = useState("Tous");
  const [modal,setModal]            = useState(null);
  const [replyMode,setReplyMode]    = useState("client");
  const [replyDraft,setReplyDraft]  = useState("");
  const [loading,setLoading]        = useState(true);
  const [loadingMsgs,setLoadingMsgs]= useState(false);
  const [saving,setSaving]          = useState(false);
  const [toast,setToast]            = useState({msg:"",ok:true,visible:false});
  const [ticketForm,setTicketForm]  = useState({clinicId:"",title:"",priority:"Normale",assignee:ME,message:"",tags:""});
  const [clinicForm,setClinicForm]  = useState({name:"",city:"",email:"",phone:""});

  const showToast = (msg,ok=true)=>{
    setToast({msg,ok,visible:true});
    setTimeout(()=>setToast(p=>({...p,visible:false})),3000);
  };

  useEffect(()=>{
    loadAll();
    // Realtime
    const chan=sb.channel("realtime-tickets")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"tickets"},p=>{
        setTickets(prev=>[p.new,...prev]);
        showToast("📧 Nouveau ticket reçu !",true);
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"tickets"},p=>{
        setTickets(prev=>prev.map(t=>t.id===p.new.id?p.new:t));
      })
      .subscribe();
    return ()=>sb.removeChannel(chan);
  },[]);

  useEffect(()=>{
    if(!ticketId){setMessages([]);return;}
    loadMessages(ticketId);
    const chan=sb.channel(`msgs-${ticketId}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`ticket_id=eq.${ticketId}`},
        p=>{setMessages(prev=>[...prev,p.new]);})
      .subscribe();
    return ()=>sb.removeChannel(chan);
  },[ticketId]);

  async function loadAll(){
    setLoading(true);
    const [{data:cl},{data:tk}]=await Promise.all([
      sb.from("clinics").select("*").order("name"),
      sb.from("tickets").select("*").order("updated_at",{ascending:false}),
    ]);
    if(cl){setClinics(cl);if(cl[0])setTicketForm(p=>({...p,clinicId:cl[0].id}));}
    if(tk) setTickets(tk);
    setLoading(false);
  }
  async function loadMessages(tid){
    setLoadingMsgs(true);
    const {data}=await sb.from("messages").select("*").eq("ticket_id",tid).order("created_at");
    if(data) setMessages(data);
    setLoadingMsgs(false);
  }

  const clinicsById = useMemo(()=>Object.fromEntries(clinics.map(c=>[c.id,c])),[clinics]);
  const filtered = useMemo(()=>{
    const q=query.trim().toLowerCase();
    return tickets
      .filter(t=>sf==="Tous"||t.status===sf)
      .filter(t=>!q||[t.title,t.sender_email||"",clinicsById[t.clinic_id]?.name||"",...(t.tags||[])].join(" ").toLowerCase().includes(q));
  },[tickets,query,sf,clinicsById]);

  const myTickets  = useMemo(()=>filtered.filter(t=>t.assigned_to===ME&&t.status!=="Résolu"),[filtered]);
  const clinicTkts = useMemo(()=>filtered.filter(t=>t.clinic_id===clinicId),[filtered,clinicId]);
  const selTicket  = useMemo(()=>ticketId?tickets.find(t=>t.id===ticketId)||null:null,[tickets,ticketId]);
  const kpis = useMemo(()=>({
    ouvert:tickets.filter(t=>t.status==="Ouvert").length,
    enCours:tickets.filter(t=>t.status==="En cours").length,
    attente:tickets.filter(t=>t.status==="En attente").length,
    resolu:tickets.filter(t=>t.status==="Résolu").length,
    total:tickets.length,
    myOpen:tickets.filter(t=>t.assigned_to===ME&&t.status!=="Résolu").length,
  }),[tickets]);

  const createTicket = useCallback(async()=>{
    if(!ticketForm.clinicId||!ticketForm.title.trim()) return;
    setSaving(true);
    try{
      const {data:tk,error}=await sb.from("tickets").insert({
        clinic_id:ticketForm.clinicId, title:ticketForm.title.trim(),
        status:"Ouvert", priority:ticketForm.priority, channel:"Interne",
        assigned_to:ticketForm.assignee||null,
        tags:ticketForm.tags.split(",").map(s=>s.trim()).filter(Boolean),
      }).select().single();
      if(error) throw error;
      if(ticketForm.message.trim())
        await sb.from("messages").insert({ticket_id:tk.id,from_name:ME,text:ticketForm.message.trim(),kind:"internal"});
      setTickets(p=>[tk,...p]);
      setTicketId(tk.id);
      setModal(null);
      setTicketForm(p=>({...p,title:"",message:"",tags:""}));
      showToast("Ticket créé ✓");
    }catch(e){showToast("Erreur: "+e.message,false);}
    setSaving(false);
  },[ticketForm]);

  const createClinic = useCallback(async()=>{
    if(!clinicForm.name.trim()||!clinicForm.city.trim()) return;
    setSaving(true);
    try{
      const {data:c,error}=await sb.from("clinics").insert({
        name:clinicForm.name.trim(), city:clinicForm.city.trim(),
        email:clinicForm.email.trim()||null, phone:clinicForm.phone.trim()||null,
      }).select().single();
      if(error) throw error;
      setClinics(p=>[...p,c]);
      setClinicForm({name:"",city:"",email:"",phone:""});
      setModal(null);
      setClinicId(c.id); setView("clinic"); setTicketId(null);
      setTicketForm(p=>({...p,clinicId:c.id}));
      showToast("Clinique ajoutée ✓");
    }catch(e){showToast("Erreur: "+e.message,false);}
    setSaving(false);
  },[clinicForm]);

  const setStatus   = useCallback(async(tid,status)=>{await sb.from("tickets").update({status}).eq("id",tid);setTickets(p=>p.map(t=>t.id!==tid?t:{...t,status}));},[]);
  const setPriority = useCallback(async(tid,priority)=>{await sb.from("tickets").update({priority}).eq("id",tid);setTickets(p=>p.map(t=>t.id!==tid?t:{...t,priority}));},[]);
  const assignTicket= useCallback(async(tid,name)=>{await sb.from("tickets").update({assigned_to:name}).eq("id",tid);setTickets(p=>p.map(t=>t.id!==tid?t:{...t,assigned_to:name}));},[]);

  const sendReply = useCallback(async()=>{
    if(!selTicket||!replyDraft.trim()) return;
    const {data,error}=await sb.from("messages").insert({
      ticket_id:selTicket.id, from_name:ME, text:replyDraft.trim(), kind:replyMode,
    }).select().single();
    if(error){showToast("Erreur envoi",false);return;}
    setMessages(p=>[...p,data]);
    setReplyDraft("");
    await sb.from("tickets").update({updated_at:new Date().toISOString()}).eq("id",selTicket.id);
  },[selTicket,replyDraft,replyMode]);

  const detailProps={clinicsById,onSetStatus:setStatus,onSetPriority:setPriority,onAssign:assignTicket,
    replyDraft,setReplyDraft,replyMode,setReplyMode,onSendReply:sendReply,messages,loadingMsgs};
  const currentList=view==="myTickets"?myTickets:view==="clinic"?clinicTkts:filtered;

  return <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:"#F8F7F4",color:"#1A1A2E"}}>
    {modal==="ticket"&&<TicketModal clinics={clinics} form={ticketForm} setForm={setTicketForm} onCreate={createTicket} onClose={()=>setModal(null)} saving={saving}/>}
    {modal==="clinic"&&<ClinicModal form={clinicForm} setForm={setClinicForm} onCreate={createClinic} onClose={()=>setModal(null)} saving={saving}/>}
    <Toast {...toast}/>

    <div style={{maxWidth:1300,margin:"0 auto",padding:"22px 18px",display:"grid",gridTemplateColumns:"255px 1fr",gap:18,alignItems:"start"}}>
      <Sidebar view={view} setView={setView} query={query} setQuery={setQuery} sf={sf} setSF={setSF}
        clinics={clinics} selClinic={clinicId}
        onSelectClinic={id=>{setClinicId(id);setView("clinic");setTicketId(null);}}
        onNewTicket={()=>setModal("ticket")} onNewClinic={()=>setModal("clinic")}
        myOpen={kpis.myOpen} tickets={tickets}/>
      <main>
        {view==="dashboard"
          ?<Dashboard kpis={kpis} myTickets={myTickets} clinicsById={clinicsById}
              selTicket={selTicket} onSelectTicket={setTicketId} loading={loading} {...detailProps}/>
          :<div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:16,alignItems:"start"}}>
            <ListPanel list={currentList}
              title={view==="myTickets"?"Mes tickets":`${clinicsById[clinicId]?.name||"Clinique"}`}
              clinicsById={clinicsById} selId={selTicket?.id} onSelect={setTicketId}
              onNewTicket={()=>setModal("ticket")} loading={loading}/>
            <DetailPanel t={selTicket} {...detailProps}/>
          </div>
        }
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
