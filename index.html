<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LoveMap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#f5f1e8; padding:20px; }
    h1 { text-align:center; }
    .box { background:white; padding:20px; border-radius:10px; max-width:600px; margin:0 auto; }
    .photo { border:2px dashed #ccc; padding:20px; text-align:center; cursor:pointer; }
    .preview img { max-width:100px; margin:5px; border-radius:8px; }
    button { padding:15px; width:100%; font-size:16px; background:#D4816E; color:white; border:none; border-radius:8px; cursor:pointer; }
    button:disabled { opacity:0.6; }
    .error { color:red; margin-top:10px; }
    textarea { width:100%; min-height:70px; }
    input { width:100%; padding:10px; }
  </style>
</head>
<body>
<h1>LoveMap</h1>
<div class="box">
<form id="form">
<h3>📸 Photos (1 à 4)</h3>
<div class="photo" id="photoBox">Clique pour ajouter des photos</div>
<input type="file" id="photos" accept="image/*" multiple hidden>
<div class="preview" id="preview"></div>

<h3>💑 Infos</h3>
<input required placeholder="Prénom 1" name="prenom1"><br><br>
<input required placeholder="Prénom 2" name="prenom2"><br><br>
<input required type="email" placeholder="Email" name="email"><br><br>

<h3>🗺️ Étapes (min 3)</h3>
<div id="steps"></div>
<button type="button" id="addStep">+ Ajouter une étape</button><br><br>

<h3>🖼️ Cadre (+40€)</h3>
<label><input type="checkbox" id="frame"> Oui</label><br><br>

<div class="error" id="error"></div><br>
<button id="submit">Commander</button>
</form>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwykRH7WsAuH-9F6Ypd3QfclDZhrDE6nH0FVcBZLg36DfNg17IjIz0eRBQeN4NNXTgI/exec";
const STRIPE_19 = "https://buy.stripe.com/9B68wQ2EG1zx4Lvf0C5kk00";
const STRIPE_59 = "https://buy.stripe.com/3cI00kgvwceb91LcSu5kk01";

let photosData = [];
const photosInput = document.getElementById("photos");
const preview = document.getElementById("preview");
document.getElementById("photoBox").onclick = () => photosInput.click();

photosInput.onchange = async e => {
  for (let f of e.target.files) {
    if (photosData.length >= 4) break;
    const data = await compress(f);
    photosData.push({ name: f.name, data });
  }
  renderPhotos();
  photosInput.value = "";
};

function renderPhotos(){
  preview.innerHTML = photosData.map(p => `<img src="${p.data}">`).join("");
}

async function compress(file){
  const img = new Image();
  img.src = URL.createObjectURL(file);
  await img.decode();
  const c = document.createElement("canvas");
  const r = Math.min(1600/img.width,1600/img.height,1);
  c.width = img.width*r; c.height = img.height*r;
  c.getContext("2d").drawImage(img,0,0,c.width,c.height);
  const out = c.toDataURL("image/jpeg",0.8);
  URL.revokeObjectURL(img.src);
  return out;
}

const stepsDiv = document.getElementById("steps");
function addStep(){
  const d = document.createElement("div");
  d.innerHTML = `<input required placeholder="Lieu"><br>
  <textarea required placeholder="Description"></textarea><br><br>`;
  stepsDiv.appendChild(d);
}
document.getElementById("addStep").onclick = addStep;
addStep(); addStep(); addStep();

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();
  const error = document.getElementById("error");
  error.textContent = "";

  if (photosData.length === 0) { error.textContent="Ajoute au moins une photo"; return; }
  if (stepsDiv.children.length < 3) { error.textContent="Ajoute au moins 3 étapes"; return; }

  const fd = new FormData(e.target);
  const payload = {
    prenom1: fd.get("prenom1"),
    prenom2: fd.get("prenom2"),
    email: fd.get("email"),
    optionCadre: document.getElementById("frame").checked ? "Oui" : "Non",
    prixTotal: document.getElementById("frame").checked ? "59€" : "19€",
    photos: photosData,
    etapes: [...stepsDiv.children].map((s,i)=>({
      numero:i+1,
      lieu:s.querySelector("input").value,
      description:s.querySelector("textarea").value
    }))
  };

  const btn = document.getElementById("submit");
  btn.disabled=true; btn.textContent="Enregistrement…";

  fetch(GOOGLE_SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(payload)
  });

  setTimeout(()=>{
    const stripeUrl = document.getElementById("frame").checked ? STRIPE_59 : STRIPE_19;
    window.location.href = stripeUrl + "?prefilled_email=" + encodeURIComponent(payload.email);
  },500);
};
</script>
</body>
</html>
