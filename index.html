// ── Helpers ────────────────────────────────────────────────────────────────
function fmtFR(iso){
  return new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function timeAgo(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<60) return `il y a ${m}min`;
  const h=Math.floor(m/60);
  if(h<24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h/24)}j`;
}
function initials(name){return name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function nextTicketId(list){
  const nums=list.map(t=>parseInt(t.id.replace(/\D/g,""),10)).filter(n=>!isNaN(n));
  return `TCK-${(nums.length?Math.max(...nums):1000)+1}`;
}
function nextClinicId(list){
  return `c_${Date.now()}`;
}

// ── Atoms ──────────────────────────────────────────────────────────────────
function StatusBadge({status,small}){
  const c=STATUS_CFG[status]||STATUS_CFG["Ouvert"];
  return <span style={{background:c.bg,color:c.color,padding:small?"2px 7px":"3px 10px",borderRadius:99,
    fontSize:small?10:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,
    border:`1px solid ${c.color}22`}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:c.color,display:"inline-block"}}/>
    {status}
  </span>;
}
function PriBadge({priority}){
  const c=PRIORITY_CFG[priority]||PRIORITY_CFG["Normale"];
  return <span style={{background:c.bg,color:c.color,padding:"2px 7px",borderRadius:99,
    fontSize:10,fontWeight:600,border:`1px solid ${c.color}33`}}>{priority}</span>;
}
function Ava({name,size=28}){
  const cols=["#0D7377","#7C3AED","#DB2777","#0369A1","#065F46"];
  const bg=cols[name.charCodeAt(0)%cols.length];
  return <div style={{width:size,height:size,borderRadius:"50%",background:bg,color:"#fff",
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*0.38,fontWeight:700,flexShrink:0}}>{initials(name)}</div>;
}
function Tag({t}){
  return <span style={{background:"#F0FDF4",color:"#15803D",padding:"1px 7px",
    borderRadius:99,fontSize:10,fontWeight:600,border:"1px solid #BBF7D0"}}>{t}</span>;
}
function Fld({label,children}){
  return <div>
    <label style={{fontSize:11,fontWeight:600,color:"#6B7280",textTransform:"uppercase",
      letterSpacing:.4,display:"block",marginBottom:4}}>{label}</label>
    {children}
  </div>;
}

// ── Shared input styles ────────────────────────────────────────────────────
const inp = {width:"100%",padding:"8px 10px",border:"1px solid #E5E3DF",borderRadius:8,
  fontSize:13.5,color:"#1A1A2E",background:"#FAFAF9",outline:"none"};

// ── NavBtn ─────────────────────────────────────────────────────────────────
function NavBtn({icon,label,sub,active,onClick,badge}){
  const [hov,setHov]=useState(false);
  return <button onClick={onClick}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 9px",
      borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",marginBottom:2,
      background:active?"#0D7377":hov?"#F3F4F6":"transparent",
      color:active?"#fff":"#374151",fontSize:13,fontWeight:active?600:400,transition:"background .13s"}}>
    <span style={{fontSize:13}}>{icon}</span>
    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
    {sub&&<span style={{fontSize:10,opacity:.6,flexShrink:0}}>{sub}</span>}
    {badge!=null&&<span style={{background:active?"rgba(255,255,255,.3)":"#0D7377",color:"#fff",
      fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99,flexShrink:0}}>{badge}</span>}
  </button>;
}

// ── Sidebar ────────────────────────────────────────────────────────────────

    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,paddingBottom:16,borderBottom:"1px solid #F0EFEC"}}>

      <div>
        <div style={{fontWeight:700,fontSize:13}}>MonRendezVousVeto</div>
        <div style={{fontSize:11,color:"#9CA3AF"}}>SAV · Ticketing</div>
      </div>
    </div>

    <button onClick={onNewTicket} style={{width:"100%",padding:"9px",background:"#0D7377",color:"#fff",
      border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:14}}>
      <span style={{fontSize:16,lineHeight:1}}>+</span> Nouveau ticket
    </button>

    <div style={{position:"relative",marginBottom:10}}>
      <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#9CA3AF"}}>🔍</span>

    <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}

    <div style={{marginBottom:14}}>
      <NavBtn icon="📊" label="Tableau de bord" active={view==="dashboard"} onClick={()=>setView("dashboard")}/>
      <NavBtn icon="🎫" label="Mes tickets" active={view==="myTickets"} onClick={()=>setView("myTickets")} badge={myOpenCount||null}/>
    </div>

    <div style={{borderTop:"1px solid #F0EFEC",paddingTop:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,paddingLeft:4}}>

        <button onClick={onNewClinic}

            alignItems:"center",justifyContent:"center",lineHeight:1,flexShrink:0}}>+</button>
      </div>
      {clinics.map(c=>{

        return <NavBtn key={c.id} icon="🏥" label={c.name} sub={c.city}

// ── Ticket list panel ──────────────────────────────────────────────────────
function ListPanel({list,title,clinicsById,agentsById,assignees,selectedId,onSelect,onNewTicket}){

    <div style={{padding:"15px 16px 12px",borderBottom:"1px solid #F0EFEC",
      display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14}}>{title}</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{list.length} ticket{list.length!==1?"s":""}</div>
      </div>
      {onNewTicket&&<button onClick={onNewTicket} style={{padding:"5px 12px",background:"#0D7377",
        color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Nouveau</button>}
    </div>
    <div style={{maxHeight:580,overflowY:"auto",padding:"6px"}}>
      {list.length===0
        ?<div style={{textAlign:"center",padding:"32px",color:"#9CA3AF",fontSize:13}}>Aucun ticket.</div>
        :list.map(t=>{
          const clinic=clinicsById[t.clinicId];
          const agent=agentsById[assignees[t.id]];
          return <TicketRow key={t.id} t={t} clinic={clinic} agent={agent}
            active={t.id===selectedId} onClick={()=>onSelect(t.id)}/>;
        })}
    </div>
  </div>;
}

function TicketRow({t,clinic,agent,active,onClick}){
  const [hov,setHov]=useState(false);
  return <button onClick={onClick}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}

      border:active?"1.5px solid #0D7377":"1.5px solid transparent",
      background:active?"#F0FAFA":hov?"#FAFAF9":"transparent",
      cursor:"pointer",marginBottom:2,transition:"all .12s"}}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:5}}>
      <span style={{fontWeight:600,fontSize:13,color:"#1A1A2E",lineHeight:1.3}}>{t.title}</span>
      <span style={{fontSize:10,color:"#9CA3AF",flexShrink:0,marginTop:2}}>{timeAgo(t.updatedAt)}</span>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>
      <span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 6px",borderRadius:99,fontWeight:600}}>{t.id}</span>

      <PriBadge priority={t.priority}/>

    <div style={{display:"flex",alignItems:"center",gap:6}}>
      {agent&&<><Ava name={agent.name} size={16}/><span style={{fontSize:11,color:"#6B7280"}}>{agent.name}</span></>}
      {t.tags?.slice(0,2).map(tag=><Tag key={tag} t={tag}/>)}

}

// ── Detail panel ───────────────────────────────────────────────────────────
function DetailPanel({ticket:t,clinicsById,agentsById,assignees,onSetStatus,onSetPriority,onAssign,

    <div style={{fontWeight:600,fontSize:14}}>Aucun ticket sélectionné</div>

  </div>;

  const agentId=assignees[t.id];
  const agent=agentsById[agentId];
  const sel={padding:"5px 8px",border:"1px solid #E5E3DF",borderRadius:7,fontSize:12,
    color:"#1A1A2E",background:"#FAFAF9",outline:"none",cursor:"pointer"};

  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #E5E3DF",overflow:"hidden"}}>
    <div style={{padding:"16px 18px",borderBottom:"1px solid #F0EFEC",
      background:"linear-gradient(135deg,#F0FAFA,#fff 60%)"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:10}}>
        <div>
          <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,marginBottom:3,fontFamily:"monospace"}}>{t.id} · {t.channel}</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#1A1A2E",lineHeight:1.3}}>{t.title}</div>
        </div>
        <button onClick={()=>onSetStatus(t.id,t.status==="Résolu"?"En cours":"Résolu")}
          style={{padding:"7px 13px",borderRadius:8,border:"none",cursor:"pointer",flexShrink:0,
            background:t.status==="Résolu"?"#F3F4F6":"#10B981",
            color:t.status==="Résolu"?"#6B7280":"#fff",fontSize:12,fontWeight:600}}>
          {t.status==="Résolu"?"↩ Réouvrir":"✓ Résoudre"}
        </button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        <StatusBadge status={t.status}/>
        <PriBadge priority={t.priority}/>
        {clinic&&<span style={{fontSize:11,padding:"2px 8px",background:"#F3F4F6",borderRadius:99,color:"#374151"}}>🏥 {clinic.name} · {clinic.city}</span>}
        {t.tags?.map(tag=><Tag key={tag} t={tag}/>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>Statut
          <select value={t.status} onChange={e=>onSetStatus(t.id,e.target.value)} style={sel}>
            {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </label>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>Priorité
          <select value={t.priority} onChange={e=>onSetPriority(t.id,e.target.value)} style={sel}>
            {PRIORITIES.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </label>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#9CA3AF"}}>
          {agent&&<Ava name={agent.name} size={20}/>}
          Assigné
          <select value={agentId||""} onChange={e=>onAssign(t.id,e.target.value)} style={sel}>
            {AGENTS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </label>
        <span style={{marginLeft:"auto",fontSize:10,color:"#9CA3AF"}}>Màj {fmtFR(t.updatedAt)}</span>
      </div>
    </div>

    <div style={{padding:"14px 18px",borderBottom:"1px solid #F0EFEC",maxHeight:300,overflowY:"auto"}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:"#9CA3AF",marginBottom:12}}>
        Historique ({(t.messages||[]).length} message{(t.messages||[]).length!==1?"s":""})
      </div>
      {(t.messages||[]).length===0
        ?<div style={{fontSize:13,color:"#9CA3AF"}}>Aucun message.</div>
        :(t.messages||[]).map((m,i)=><MsgBubble key={i} m={m}/>)}
    </div>

    <div style={{padding:"14px 18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
        <div style={{fontSize:12,fontWeight:700,color:"#374151"}}>Répondre</div>
        <div style={{display:"flex",gap:5}}>

              color:replyMode===v?"#fff":"#6B7280"}}>{lbl}</button>)}
        </div>
      </div>
      <textarea value={replyDraft} onChange={e=>setReplyDraft(e.target.value)}
        placeholder={replyMode==="internal"?"Note interne (équipe uniquement)…":"Message au client…"}
        onKeyDown={e=>{if(e.ctrlKey&&e.key==="Enter")onSendReply();}}
        style={{width:"100%",minHeight:72,padding:"9px 11px",resize:"vertical",outline:"none",
          border:`1.5px solid ${replyMode==="internal"?"#8B5CF6":"#E5E3DF"}`,
          borderRadius:9,fontSize:13,lineHeight:1.5,
          background:replyMode==="internal"?"#FDFBFF":"#FAFAF9"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
        <span style={{fontSize:11,color:"#9CA3AF"}}>{replyMode==="internal"?"🔒 Note interne":"✉ Client"} · Ctrl+Entrée</span>
        <button onClick={onSendReply} disabled={!replyDraft.trim()}
          style={{padding:"8px 17px",border:"none",borderRadius:8,fontSize:13,fontWeight:600,
            cursor:replyDraft.trim()?"pointer":"default",
            background:replyDraft.trim()?"#0D7377":"#E5E3DF",
            color:replyDraft.trim()?"#fff":"#9CA3AF",transition:"all .15s"}}>Envoyer</button>
      </div>
    </div>
  </div>;
}

function MsgBubble({m}){
  const isClient=m.from==="Clinique";
  const isInternal=m.kind==="internal";
  return <div style={{display:"flex",gap:9,marginBottom:11,flexDirection:isClient?"row":"row-reverse"}}>
    <Ava name={m.from} size={26}/>
    <div style={{maxWidth:"76%"}}>
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexDirection:isClient?"row":"row-reverse"}}>
        <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{m.from}</span>
        {isInternal&&<span style={{fontSize:10,background:"#F5F3FF",color:"#7C3AED",padding:"1px 6px",borderRadius:99,fontWeight:600}}>Interne</span>}
        <span style={{fontSize:10,color:"#9CA3AF"}}>{fmtFR(m.at)}</span>
      </div>
      <div style={{padding:"8px 11px",fontSize:13,lineHeight:1.55,
        borderRadius:isClient?"4px 11px 11px 11px":"11px 4px 11px 11px",
        background:isInternal?"#F5F3FF":isClient?"#F3F4F6":"#0D7377",
        color:isInternal?"#5B21B6":isClient?"#374151":"#fff",
        border:isInternal?"1px solid #DDD6FE":"none"}}>{m.text}</div>
    </div>
  </div>;
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function Dashboard({kpis,myTickets,clinicsById,agentsById,assignees,
  selectedTicket,onSelectTicket,onSetStatus,onSetPriority,onAssign,
  replyDraft,setReplyDraft,replyMode,setReplyMode,onSendReply}){
  return <div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        {label:"Ouverts",   value:kpis.ouvert,  color:"#3B82F6",sub:"À traiter"},
        {label:"En cours",  value:kpis.enCours, color:"#F59E0B",sub:"En investigation"},
        {label:"En attente",value:kpis.attente, color:"#8B5CF6",sub:"Retour attendu"},
        {label:"Résolus",   value:kpis.resolu,  color:"#10B981",sub:"Ce mois"},
      ].map(k=><div key={k.label} style={{background:"#fff",borderRadius:12,border:"1px solid #E5E3DF",padding:"15px 16px"}}>
        <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{k.label}</div>
        <div style={{fontSize:28,fontWeight:700,color:k.color,lineHeight:1,fontFamily:"'DM Serif Display',serif"}}>{k.value}</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginTop:4}}>{k.sub}</div>
        <div style={{height:3,background:"#F3F4F6",borderRadius:2,marginTop:9,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:2,background:k.color,transition:"width .5s",
            width:`${Math.round((k.value/Math.max(kpis.total,1))*100)}%`}}/>
        </div>
      </div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:16,alignItems:"start"}}>
      <ListPanel list={myTickets.slice(0,8)} title="Mes tickets actifs"
        clinicsById={clinicsById} agentsById={agentsById} assignees={assignees}
        selectedId={selectedTicket?.id} onSelect={onSelectTicket}/>
      <DetailPanel ticket={selectedTicket} clinicsById={clinicsById} agentsById={agentsById}
        assignees={assignees} onSetStatus={onSetStatus} onSetPriority={onSetPriority} onAssign={onAssign}
        replyDraft={replyDraft} setReplyDraft={setReplyDraft}
        replyMode={replyMode} setReplyMode={setReplyMode} onSendReply={onSendReply}/>
    </div>
  </div>;
}

// ── Compose ticket modal ───────────────────────────────────────────────────
function ComposeModal({clinics,form,setForm,onCreate,onClose}){
  return <Modal title="Nouveau ticket" subtitle="Créez et assignez immédiatement." onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Fld label="Clinique *">
          <select value={form.clinicId} onChange={e=>setForm(p=>({...p,clinicId:e.target.value}))} style={inp}>
            {clinics.map(c=><option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
          </select>
        </Fld>
        <Fld label="Assigné à">
          <select value={form.assigneeId} onChange={e=>setForm(p=>({...p,assigneeId:e.target.value}))} style={inp}>
            {AGENTS.map(a=><option key={a.id} value={a.id}>{a.name} ({a.role})</option>)}
          </select>
        </Fld>
        <Fld label="Priorité">
          <select value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} style={inp}>
            {PRIORITIES.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </Fld>
        <Fld label="Tags (virgules)">
          <input value={form.tags} onChange={e=>setForm(p=>({...p,tags:e.target.value}))}
            placeholder="GMVet, Synchro" style={inp}/>
        </Fld>
      </div>
      <Fld label="Titre *">
        <input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}
          placeholder="Ex : Plus de créneaux en ligne" style={inp}
          onKeyDown={e=>{if(e.key==="Enter")onCreate();}}/>
      </Fld>
      <Fld label="Premier message (optionnel)">
        <textarea value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))}
          placeholder="Contexte, étapes de reproduction…"
          style={{...inp,minHeight:72,resize:"vertical"}}/>
      </Fld>
      <ModalFooter onClose={onClose} onConfirm={onCreate} disabled={!form.clinicId||!form.title.trim()} label="Créer le ticket"/>
    </div>
  </Modal>;
}

// ── New clinic modal ───────────────────────────────────────────────────────
function ClinicModal({form,setForm,onCreate,onClose}){
  const valid = form.name.trim() && form.city.trim();
  return <Modal title="Nouvelle clinique" subtitle="Ajoutez une clinique partenaire." onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Fld label="Nom de la clinique *">
          <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
            placeholder="Clinique Vét. Bordeaux" style={inp}/>
        </Fld>
        <Fld label="Ville *">
          <input value={form.city} onChange={e=>setForm(p=>({...p,city:e.target.value}))}
            placeholder="Bordeaux" style={inp}/>
        </Fld>
        <Fld label="Email">
          <input value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}
            placeholder="contact@clinique.fr" type="email" style={inp}/>
        </Fld>
        <Fld label="Téléphone">
          <input value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}
            placeholder="05 XX XX XX XX" style={inp}/>
        </Fld>
      </div>
      <ModalFooter onClose={onClose} onConfirm={onCreate} disabled={!valid} label="Ajouter la clinique"/>
    </div>
  </Modal>;
}

// ── Reusable modal shell ───────────────────────────────────────────────────
function Modal({title,subtitle,onClose,children}){
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
    style={{position:"fixed",inset:0,background:"rgba(26,26,46,.5)",zIndex:50,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:560,
      maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
      <div style={{padding:"18px 22px",borderBottom:"1px solid #F0EFEC",
        background:"linear-gradient(135deg,#F0FAFA,#fff 60%)",
        display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20}}>{title}</div>
          {subtitle&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{subtitle}</div>}
        </div>
        <button onClick={onClose} style={{background:"none",border:"1px solid #E5E3DF",borderRadius:6,
          width:26,height:26,cursor:"pointer",fontSize:14,color:"#9CA3AF",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
      </div>
      <div style={{padding:"18px 22px"}}>{children}</div>
    </div>
  </div>;
}
function ModalFooter({onClose,onConfirm,disabled,label}){
  return <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
    <button onClick={onClose} style={{padding:"9px 17px",background:"#F3F4F6",color:"#374151",
      border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Annuler</button>
    <button onClick={onConfirm} disabled={disabled}
      style={{padding:"9px 17px",border:"none",borderRadius:8,fontSize:13,fontWeight:600,
        cursor:disabled?"default":"pointer",
        background:disabled?"#E5E3DF":"#0D7377",
        color:disabled?"#9CA3AF":"#fff",transition:"all .15s"}}>{label}</button>
  </div>;
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]              = useState("dashboard");
  const [clinics,setClinics]        = useState(INIT_CLINICS);
  const [clinicId,setClinicId]      = useState(null);
  const [ticketId,setTicketId]      = useState(null);
  const [query,setQuery]            = useState("");
  const [statusFilter,setSF]        = useState("Tous");
  const [modal,setModal]            = useState(null); // null | "ticket" | "clinic"
  const [replyMode,setReplyMode]    = useState("client");
  const [replyDraft,setReplyDraft]  = useState("");
  const [tickets,setTickets]        = useState(SEED);
  const [assignees,setAssignees]    = useState(INIT_ASSIGNEES);

  const [ticketForm,setTicketForm]  = useState({
    clinicId:INIT_CLINICS[0].id, title:"", priority:"Normale", assigneeId:"u_me", message:"", tags:""
  });
  const [clinicForm,setClinicForm]  = useState({name:"",city:"",email:"",phone:""});

  const clinicsById = useMemo(()=>Object.fromEntries(clinics.map(c=>[c.id,c])),[clinics]);
  const agentsById  = useMemo(()=>Object.fromEntries(AGENTS.map(a=>[a.id,a])),[]);

  const filtered = useMemo(()=>{
    const q=query.trim().toLowerCase();
    return tickets
      .filter(t=>statusFilter==="Tous"||t.status===statusFilter)
      .filter(t=>!q||[t.id,t.title,clinicsById[t.clinicId]?.name||"",...(t.tags||[])].join(" ").toLowerCase().includes(q))
      .sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  },[tickets,query,statusFilter,clinicsById]);

  const myTickets      = useMemo(()=>filtered.filter(t=>assignees[t.id]==="u_me"&&t.status!=="Résolu"),[filtered,assignees]);
  const clinicTkts     = useMemo(()=>filtered.filter(t=>t.clinicId===clinicId),[filtered,clinicId]);
  const selectedTicket = useMemo(()=>ticketId?tickets.find(t=>t.id===ticketId)||null:null,[tickets,ticketId]);

  const kpis = useMemo(()=>({
    ouvert: tickets.filter(t=>t.status==="Ouvert").length,
    enCours:tickets.filter(t=>t.status==="En cours").length,
    attente:tickets.filter(t=>t.status==="En attente").length,
    resolu: tickets.filter(t=>t.status==="Résolu").length,
    total:  tickets.length,
    myOpen: Object.entries(assignees).filter(([id,uid])=>uid==="u_me"&&tickets.find(t=>t.id===id&&t.status!=="Résolu")).length,
  }),[tickets,assignees]);

  // ── Actions ──
  const createTicket = useCallback(()=>{
    if(!ticketForm.clinicId||!ticketForm.title.trim()) return;
    const now=new Date().toISOString();
    const id=nextTicketId(tickets);
    setTickets(p=>[{id,clinicId:ticketForm.clinicId,title:ticketForm.title.trim(),
      status:"Ouvert",priority:ticketForm.priority,channel:"Interne",
      createdAt:now,updatedAt:now,
      tags:ticketForm.tags.split(",").map(s=>s.trim()).filter(Boolean),
      messages:ticketForm.message.trim()?[{at:now,from:"SAV",text:ticketForm.message.trim(),kind:"internal"}]:[],
    },...p]);
    setAssignees(p=>({...p,[id]:ticketForm.assigneeId}));
    setTicketId(id);
    setModal(null);
    setTicketForm(p=>({...p,title:"",message:"",tags:""}));
  },[ticketForm,tickets]);

  const createClinic = useCallback(()=>{
    if(!clinicForm.name.trim()||!clinicForm.city.trim()) return;
    const id=nextClinicId(clinics);
    const nc={id,name:clinicForm.name.trim(),city:clinicForm.city.trim(),
      email:clinicForm.email.trim(),phone:clinicForm.phone.trim()};
    setClinics(p=>[...p,nc]);
    setClinicForm({name:"",city:"",email:"",phone:""});
    setModal(null);
    // Auto-navigate to new clinic
    setClinicId(id);
    setView("clinic");
    setTicketId(null);
    // Pre-fill clinic in ticket form
    setTicketForm(p=>({...p,clinicId:id}));
  },[clinicForm,clinics]);

  const setStatus   = useCallback((tid,s)=>setTickets(p=>p.map(t=>t.id!==tid?t:{...t,status:s,updatedAt:new Date().toISOString()})),[]);
  const setPriority = useCallback((tid,s)=>setTickets(p=>p.map(t=>t.id!==tid?t:{...t,priority:s})),[]);
  const assignTicket= useCallback((tid,aid)=>setAssignees(p=>({...p,[tid]:aid})),[]);

  const sendReply = useCallback(()=>{
    if(!selectedTicket||!replyDraft.trim()) return;
    const now=new Date().toISOString();
    setTickets(p=>p.map(t=>t.id!==selectedTicket.id?t:{
      ...t,updatedAt:now,
      messages:[...(t.messages||[]),{at:now,from:"SAV",text:replyDraft.trim(),kind:replyMode}],
    }));
    setReplyDraft("");
  },[selectedTicket,replyDraft,replyMode]);

  const detailProps={clinicsById,agentsById,assignees,
    onSetStatus:setStatus,onSetPriority:setPriority,onAssign:assignTicket,
    replyDraft,setReplyDraft,replyMode,setReplyMode,onSendReply:sendReply};

  const currentList = view==="myTickets"?myTickets:view==="clinic"?clinicTkts:filtered;

  return <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:"#F8F7F4",color:"#1A1A2E"}}>

    {modal==="ticket"&&<ComposeModal clinics={clinics} form={ticketForm} setForm={setTicketForm}
      onCreate={createTicket} onClose={()=>setModal(null)}/>}

    {modal==="clinic"&&<ClinicModal form={clinicForm} setForm={setClinicForm}
      onCreate={createClinic} onClose={()=>setModal(null)}/>}

    <div style={{maxWidth:1300,margin:"0 auto",padding:"22px 18px",
      display:"grid",gridTemplateColumns:"255px 1fr",gap:18,alignItems:"start"}}>

      <Sidebar view={view} setView={setView} query={query} setQuery={setQuery}
        statusFilter={statusFilter} setStatusFilter={setSF}
        clinics={clinics} selectedClinicId={clinicId}
        onSelectClinic={id=>{setClinicId(id);setView("clinic");setTicketId(null);}}
        onNewTicket={()=>setModal("ticket")}
        onNewClinic={()=>setModal("clinic")}
        myOpenCount={kpis.myOpen} tickets={tickets} assignees={assignees}/>

      <main>
        {view==="dashboard"
          ?<Dashboard kpis={kpis} myTickets={myTickets}
              clinicsById={clinicsById} agentsById={agentsById} assignees={assignees}
              selectedTicket={selectedTicket} onSelectTicket={setTicketId} {...detailProps}/>
          :<div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:16,alignItems:"start"}}>
            <ListPanel list={currentList}
              title={view==="myTickets"?"Mes tickets":`${clinicsById[clinicId]?.name||"Clinique"}`}
              clinicsById={clinicsById} agentsById={agentsById} assignees={assignees}
              selectedId={selectedTicket?.id} onSelect={setTicketId}
              onNewTicket={()=>setModal("ticket")}/>
            <DetailPanel ticket={selectedTicket} {...detailProps}/>
          </div>
        }
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
